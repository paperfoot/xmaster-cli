name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: xmaster
            asset_name: xmaster-x86_64-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: xmaster
            asset_name: xmaster-aarch64-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: xmaster
            asset_name: xmaster-x86_64-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: xmaster.exe
            asset_name: xmaster-x86_64-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.asset_name }}
      - name: Upload to release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ${{ matrix.asset_name }}
